<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" role="img" aria-labelledby="aiToolsT aiToolsD">
  <title id="aiToolsT">AI nástroje</title>
  <desc id="aiToolsD">Přehled AI nástrojů používaných pro psaní, kód, analýzu a plánování. Bez konkrétních log značek.</desc>
  <defs>
    <linearGradient id="cBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f8fb"/>
    </linearGradient>
  </defs>
  <rect width="800" height="220" fill="#fafbfd" rx="12"/>
  <g font-family="-apple-system, system-ui, sans-serif">
    <!-- Card 1: Rozhovor (ChatGPT-style) -->
    <g transform="translate(30,40)">
      <rect width="170" height="140" rx="14" fill="url(#cBg)" stroke="#d6e0eb"/>
      <g transform="translate(20,22)">
        <circle cx="20" cy="20" r="20" fill="#e8f4f0" stroke="#9cf2a6" stroke-width="2"/>
        <path d="M10 18 q0 -8 10 -8 q10 0 10 8 v6 q0 4 -4 4 h-6 l-5 5 v-5 h-1 q-4 0 -4 -4 z" fill="#5b8bb8"/>
      </g>
      <text x="20" y="98" font-size="14" font-weight="700" fill="#2d3a4f">Rozhovor</text>
      <text x="20" y="116" font-size="11" fill="#6c7a8c">Nápady, struktura,</text>
      <text x="20" y="129" font-size="11" fill="#6c7a8c">vysvětlení, plány.</text>
    </g>

    <!-- Card 2: Kód / soubory (Claude-style) -->
    <g transform="translate(220,40)">
      <rect width="170" height="140" rx="14" fill="url(#cBg)" stroke="#d6e0eb"/>
      <g transform="translate(20,22)">
        <rect x="0" y="2" width="40" height="36" rx="5" fill="#fff3e0" stroke="#e2a857" stroke-width="2"/>
        <path d="M8 12 l8 -8 h16 v6 h-6 v8 h-18 z" fill="#e2a857"/>
        <path d="M14 24 h12 M14 30 h8" stroke="#2d3a4f" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      <text x="20" y="98" font-size="14" font-weight="700" fill="#2d3a4f">Soubory &amp; kód</text>
      <text x="20" y="116" font-size="11" fill="#6c7a8c">Práce s repem,</text>
      <text x="20" y="129" font-size="11" fill="#6c7a8c">úpravy, reporty.</text>
    </g>

    <!-- Card 3: Hvězda / analýza (Gemini-style) -->
    <g transform="translate(410,40)">
      <rect width="170" height="140" rx="14" fill="url(#cBg)" stroke="#d6e0eb"/>
      <g transform="translate(20,22)">
        <path d="M20 4 l5 11 l11 5 l-11 5 l-5 11 l-5 -11 l-11 -5 l11 -5 z" fill="#c8a6ff" stroke="#9b78d4" stroke-width="2" stroke-linejoin="round"/>
      </g>
      <text x="20" y="98" font-size="14" font-weight="700" fill="#2d3a4f">Analýza</text>
      <text x="20" y="116" font-size="11" fill="#6c7a8c">Propojení dat,</text>
      <text x="20" y="129" font-size="11" fill="#6c7a8c">srovnání nápadů.</text>
    </g>

    <!-- Card 4: Nástroj -->
    <g transform="translate(600,40)">
      <rect width="170" height="140" rx="14" fill="url(#cBg)" stroke="#d6e0eb"/>
      <g transform="translate(20,22)">
        <path d="M5 22 l10 -10 q4 -4 8 0 l5 5 q4 4 0 8 l-10 10 q-4 4 -8 0 l-5 -5 q-4 -4 0 -8 z" fill="#7cd6ff" stroke="#3d9eb8" stroke-width="2"/>
        <circle cx="14" cy="22" r="3" fill="#fafbfd"/>
      </g>
      <text x="20" y="98" font-size="14" font-weight="700" fill="#2d3a4f">Další AI</text>
      <text x="20" y="116" font-size="11" fill="#6c7a8c">Kontrola textu,</text>
      <text x="20" y="129" font-size="11" fill="#6c7a8c">rychlé porovnání.</text>
    </g>
  </g>
  <text x="400" y="206" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#9aa6b8">Ilustrace — bez ochranných známek a oficiálních log.</text>
</svg>
