<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" role="img" aria-labelledby="aiSafT aiSafD">
  <title id="aiSafT">Kontrolní seznam — kde dávat pozor</title>
  <desc id="aiSafD">Kontrolní seznam oblastí, kde je potřeba výstupy AI ověřovat: fakta, peníze, zdraví a právo, osobní údaje, technické změny.</desc>
  <rect width="800" height="240" fill="#fafbfd" rx="12"/>
  <g font-family="-apple-system, system-ui, sans-serif">
    <g transform="translate(30,28)">
      <rect width="32" height="32" rx="8" fill="#ffe8e8"/>
      <text x="16" y="22" text-anchor="middle" font-size="18">⚠</text>
      <text x="48" y="22" font-size="16" font-weight="700" fill="#b85050">AI může pomoci, ale výsledek je potřeba ověřit.</text>
    </g>

    <!-- Five check items -->
    <g transform="translate(30,80)" font-size="13">
      <g>
        <circle cx="14" cy="14" r="11" fill="none" stroke="#5ba85b" stroke-width="2"/>
        <path d="M8 14 l4 4 l8 -8" fill="none" stroke="#5ba85b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="36" y="13" font-weight="600" fill="#2d3a4f">Fakta — ověřit zdrojem</text>
        <text x="36" y="29" font-size="11" fill="#6c7a8c">AI může znít sebejistě i když se plete.</text>
      </g>
      <g transform="translate(370,0)">
        <circle cx="14" cy="14" r="11" fill="none" stroke="#5ba85b" stroke-width="2"/>
        <path d="M8 14 l4 4 l8 -8" fill="none" stroke="#5ba85b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="36" y="13" font-weight="600" fill="#2d3a4f">Peníze — vždy zkontrolovat</text>
        <text x="36" y="29" font-size="11" fill="#6c7a8c">Žádné rozhodnutí o investicích jen podle AI.</text>
      </g>
    </g>

    <g transform="translate(30,140)" font-size="13">
      <g>
        <circle cx="14" cy="14" r="11" fill="none" stroke="#5ba85b" stroke-width="2"/>
        <path d="M8 14 l4 4 l8 -8" fill="none" stroke="#5ba85b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="36" y="13" font-weight="600" fill="#2d3a4f">Zdraví, právo — odborník</text>
        <text x="36" y="29" font-size="11" fill="#6c7a8c">AI ne, lékař / právník ano.</text>
      </g>
      <g transform="translate(370,0)">
        <circle cx="14" cy="14" r="11" fill="none" stroke="#5ba85b" stroke-width="2"/>
        <path d="M8 14 l4 4 l8 -8" fill="none" stroke="#5ba85b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="36" y="13" font-weight="600" fill="#2d3a4f">Osobní údaje — chránit</text>
        <text x="36" y="29" font-size="11" fill="#6c7a8c">Nevkládat citlivé info do veřejné chat.</text>
      </g>
    </g>

    <g transform="translate(30,200)" font-size="13">
      <circle cx="14" cy="14" r="11" fill="none" stroke="#5ba85b" stroke-width="2"/>
      <path d="M8 14 l4 4 l8 -8" fill="none" stroke="#5ba85b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="36" y="13" font-weight="600" fill="#2d3a4f">Technické změny — nejdřív test, pak nasazení</text>
    </g>
  </g>
</svg>
