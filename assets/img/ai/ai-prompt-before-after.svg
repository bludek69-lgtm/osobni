<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" role="img" aria-labelledby="aiPbaT aiPbaD">
  <title id="aiPbaT">Špatný vs lepší prompt</title>
  <desc id="aiPbaD">Porovnání obecného dotazu na AI ("Napiš něco o Itálii") a konkrétnějšího promptu s kontextem o autě, parkování, jídle a chybách turistů.</desc>
  <rect width="800" height="280" fill="#fafbfd" rx="12"/>
  <g font-family="-apple-system, system-ui, sans-serif">
    <!-- Špatně -->
    <g transform="translate(30,30)">
      <rect width="350" height="220" rx="14" fill="#ffffff" stroke="#f0c8c8" stroke-width="2"/>
      <rect width="350" height="36" rx="14" fill="#ffe8e8"/>
      <rect y="30" width="350" height="6" fill="#ffe8e8"/>
      <text x="18" y="24" font-size="14" font-weight="700" fill="#b85050">✕ Špatně</text>
      <text x="290" y="24" font-size="11" fill="#b85050">obecné</text>
      <g transform="translate(20,60)" font-family="'JetBrains Mono', monospace">
        <rect width="310" height="60" rx="8" fill="#fafbfd" stroke="#e8e8e8"/>
        <text x="14" y="35" font-size="14" fill="#2d3a4f">"Napiš něco o Itálii."</text>
      </g>
      <g transform="translate(20,140)" font-size="11" fill="#6c7a8c">
        <text>AI neví:</text>
        <text y="18">· pro koho píše,</text>
        <text y="34">· jakou má délku,</text>
        <text y="50">· co tě zajímá.</text>
      </g>
    </g>

    <!-- Lépe -->
    <g transform="translate(420,30)">
      <rect width="350" height="220" rx="14" fill="#ffffff" stroke="#c8e8c8" stroke-width="2"/>
      <rect width="350" height="36" rx="14" fill="#e8f4e8"/>
      <rect y="30" width="350" height="6" fill="#e8f4e8"/>
      <text x="18" y="24" font-size="14" font-weight="700" fill="#3d8a3d">✓ Lépe</text>
      <text x="285" y="24" font-size="11" fill="#3d8a3d">s kontextem</text>
      <g transform="translate(20,60)" font-family="'JetBrains Mono', monospace">
        <rect width="310" height="110" rx="8" fill="#fafbfd" stroke="#e8e8e8"/>
        <text x="14" y="22" font-size="11" fill="#2d3a4f">"Napiš článek pro člověka,</text>
        <text x="14" y="38" font-size="11" fill="#2d3a4f">který jede poprvé autem</text>
        <text x="14" y="54" font-size="11" fill="#2d3a4f">do Toskánska. Zaměř se na</text>
        <text x="14" y="70" font-size="11" fill="#2d3a4f">parkování, jídlo, zvyky</text>
        <text x="14" y="86" font-size="11" fill="#2d3a4f">a časté chyby turistů."</text>
        <text x="14" y="104" font-size="10" fill="#6c7a8c">→ konkrétní cílovka + scope</text>
      </g>
      <g transform="translate(20,180)" font-size="11" fill="#3d8a3d">
        <text>AI dostane: kontext, cílovku, témata.</text>
      </g>
    </g>

    <!-- Šipka -->
    <g transform="translate(385,130)">
      <circle r="14" fill="#5b8bb8"/>
      <path d="M-6 0 h11 m-4 -4 l4 4 l-4 4" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
